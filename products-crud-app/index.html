<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LUXE Studio | Fashion Collection</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <nav>
            <div class="logo">
                <div class="logo-icon">L</div>
                <h1>LUXE <span>STUDIO</span></h1>
            </div>
            <button id="create">CREATE PIECE</button>
        </nav>

        <div class="container">
            <div class="products">
            </div>
        </div>

        <div class="modal">
            <div class="form">
                <button class="close">X</button>
                <form>
                    <div class="modal-header">
                        <h1 id="modalTitle">Create Collection Piece</h1>
                        <p>Luxury fashion studio editor</p>
                    </div>
                    <div class="preview">
                        <img id="previewImg" src="https://placehold.co/600x300/0b0b0b/b89a6a?text=LUXE+COLLECTION"
                            alt="preview">
                    </div>
                    <input type="text" placeholder="Product Name">
                    <input type="text" placeholder="Description">
                    <input type="number" placeholder="Price">
                    <input type="url" placeholder="Image URL">
                    <button class="formBtn">CREATE PIECE</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
